name: LaTeX Document CI
on:
  push:
    branches: [ main ]
    paths:
      - 'paper/**.tex'
  pull_request:
    branches: [ main ]
    paths:
      - 'paper/**.tex'

permissions:
  contents: write

jobs:
  compile-paper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install LaTeX Linting & Compilation Toolchain
        run: |
          sudo apt-get update || true
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra chktex

      - name: Execute LaTeX Lint Pass (chktex)
        run: |
          chktex -q -w1 paper/paper.tex

      - name: Compile Expository Paper to PDF
        run: |
          cd paper
          pdflatex -interaction=nonstopmode -halt-on-error paper.tex
          pdflatex -interaction=nonstopmode -halt-on-error paper.tex

      - name: Upload Compiled Document Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expository-paper-pdf
          path: paper/paper.pdf

      - name: Commit and Push Compiled PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add paper/paper.pdf
          git commit -m "docs: compile and update paper.pdf artifact [skip ci]" || echo "No changes to commit"
          git push origin main
